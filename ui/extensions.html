<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Extensions – PySearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0d;
      --card: rgba(28, 28, 30, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #a855f7;
      --danger: #f87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 40px 48px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p.lead { color: var(--muted); font-size: 13px; margin-bottom: 24px; line-height: 1.5; max-width: 640px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
    .btn {
      border: 1px solid var(--border);
      background: #1c1c1e;
      color: var(--text);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #252528; border-color: rgba(255,255,255,0.12); }
    .btn-primary { background: rgba(168, 85, 247, 0.2); border-color: rgba(168, 85, 247, 0.45); color: #e9d5ff; }
    .btn-primary:hover { background: rgba(168, 85, 247, 0.3); }
    .btn-danger { border-color: rgba(248, 113, 113, 0.35); color: #fecaca; }
    .btn-danger:hover { background: rgba(248, 113, 113, 0.12); }
    .list { display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .card-info { flex: 1; min-width: 200px; }
    .name { font-weight: 600; font-size: 15px; }
    .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .badge-on { background: rgba(34, 197, 94, 0.2); color: #86efac; }
    .badge-off { background: rgba(113, 113, 122, 0.25); color: #d4d4d8; }
    .actions { display: flex; align-items: center; gap: 10px; }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      border-radius: 999px;
      background: #3f3f46;
      cursor: pointer;
      border: none;
      flex-shrink: 0;
    }
    .toggle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s ease;
    }
    .toggle.on { background: var(--accent); }
    .toggle.on::after { transform: translateX(20px); }
    .empty { color: var(--muted); font-size: 14px; padding: 24px 0; }
    .msg { font-size: 13px; margin-top: 12px; color: var(--muted); }
    .msg.err { color: var(--danger); }
  </style>
</head>
<body>
  <h1>Extensions</h1>
  <p class="lead">Local extensions only. Import a <strong>.zip</strong> that contains <code>manifest.json</code> and <code>content.js</code> (same folder). Scripts run on pages after load — keep them small and safe.</p>
  <div class="toolbar">
    <button type="button" class="btn btn-primary" id="btn-import">Import extension (.zip)</button>
    <button type="button" class="btn" id="btn-refresh">Refresh list</button>
  </div>
  <div id="msg" class="msg" style="display:none;"></div>
  <div id="list" class="list"></div>

  <script>
    const api = window.pyBrowser;

    function showMsg(text, isErr) {
      const el = document.getElementById('msg');
      el.style.display = text ? 'block' : 'none';
      el.textContent = text || '';
      el.className = 'msg' + (isErr ? ' err' : '');
    }

    function render(extensions) {
      const list = document.getElementById('list');
      list.innerHTML = '';
      if (!extensions || !extensions.length) {
        list.innerHTML = '<div class="empty">No extensions installed. Import a .zip to get started.</div>';
        return;
      }
      extensions.forEach((ext) => {
        const card = document.createElement('div');
        card.className = 'card';
        const on = ext.enabled !== false;
        card.innerHTML = `
          <div class="card-info">
            <div class="name">${escapeHtml(ext.name || ext.id)}<span class="badge ${on ? 'badge-on' : 'badge-off'}">${on ? 'Enabled' : 'Disabled'}</span></div>
            <div class="meta">ID: ${escapeHtml(ext.id)} · v${escapeHtml(String(ext.version || '1.0.0'))}</div>
          </div>
          <div class="actions">
            <button type="button" class="toggle ${on ? 'on' : ''}" data-id="${escapeAttr(ext.id)}" aria-label="Toggle"></button>
            <button type="button" class="btn btn-danger" data-del="${escapeAttr(ext.id)}">Delete</button>
          </div>
        `;
        list.appendChild(card);
      });

      list.querySelectorAll('.toggle').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          const nowOn = btn.classList.contains('on');
          await api.setExtensionEnabled(id, !nowOn);
          await load();
        });
      });
      list.querySelectorAll('[data-del]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-del');
          if (!confirm('Delete this extension from disk?')) return;
          await api.deleteExtension(id);
          await load();
        });
      });
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
    function escapeAttr(s) {
      return String(s).replace(/"/g, '&quot;');
    }

    async function load() {
      showMsg('');
      try {
        const extensions = await api.getExtensions();
        render(extensions || []);
      } catch (e) {
        showMsg('Could not load extensions.', true);
      }
    }

    document.getElementById('btn-refresh').onclick = () => load();

    document.getElementById('btn-import').onclick = async () => {
      showMsg('Opening file picker…');
      try {
        const res = await api.importExtensionZip();
        if (res && res.success) {
          showMsg('Imported successfully. Reloading list…');
          await load();
          showMsg('Extension imported.');
        } else {
          showMsg(res && res.error ? res.error : 'Import cancelled or failed.', true);
        }
      } catch (e) {
        showMsg(e.message || 'Import failed.', true);
      }
    };

    load();
  </script>
</body>
</html>
