<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>PySearch Browser (2026)</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- ✅ PWA FIX (was incorrectly inside CSS before) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --chrome-bg:#0b0b0d;
      --tab-inactive:#1a1a1c;
      --tab-hover:#2a2a2c;
      --tab-active:#0b0b0d;
      --navbar-bg:#0b0b0d;
      --url-bg:#1c1c1e;
      --border:rgba(255,255,255,0.08);
      --text:#f0f0f2;
      --muted:#a1a1aa;
      --accent:#a855f7;
      --sidebar-bg:#08080a;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }

    body {
      height:100vh;
      overflow:hidden;
      background:var(--chrome-bg);
      color:var(--text);
      display:flex;
      flex-direction:column;
    }

    /* ── INCORRECT JS REMOVED FROM CSS (FIXED) ── */
  </style>

  <!-- ✅ FIXED: service worker moved OUT of CSS -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</head>

<body>

  <div id="app-bg"></div>
  <div id="bg-blur"></div>

  <!-- YOUR UI (UNCHANGED BELOW THIS POINT) -->
  <!-- everything else stays the same -->

  <div id="titlebar">
    <div class="brand">
      <img class="app-logo-img" src="../assets/pysearch_mascot.png" alt="PySearch">
      <span style="font-size:14px;margin-left:5px;">PySearch</span>
    </div>

    <div id="tabs-strip"></div>

    <button id="btn-new-tab-group">⊞</button>
    <button id="btn-incognito-tab">🕶</button>
    <button id="new-tab-btn">+</button>
  </div>

  <div style="display:flex;flex:1;overflow:hidden;">
    <aside id="sidebar-gx"></aside>

    <div style="display:flex;flex-direction:column;flex:1;">
      <div id="navbar">
        <button id="btn-back">←</button>
        <button id="btn-forward">→</button>
        <button id="btn-reload">↻</button>

        <div id="url-wrapper">
          <input id="url-input" type="text" placeholder="Search or URL">
        </div>

        <button id="btn-settings">⚙️</button>
      </div>

      <div id="webviews"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
  <script src="ai-sidebar.js"></script>

</body>
</html>
