<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Landing – PySearch Browser</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0b0d;
      --card-bg: rgba(28, 28, 30, 0.4);
      --card-hover: rgba(44, 44, 46, 0.6);
      --text: #ffffff;
      --muted: #a1a1aa;
      --accent: #a855f7;
      --accent-glow: rgba(168, 85, 247, 0.3);
      --border: rgba(255, 255, 255, 0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background:
        radial-gradient(circle at 20% 20%, rgba(168, 85, 247, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
      z-index: -1;
    }

    #cursor-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%, -50%);
      will-change: transform;
      opacity: 0.8;
    }

    .main-content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #header { text-align:center; margin-bottom:50px; }
    #clock {
      font-size:80px;
      font-weight:700;
      background: linear-gradient(to bottom, #fff, #a1a1aa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    #date-greeting { font-size:18px; color:var(--muted); }

    .search-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 30px;
      height: 64px;
      display:flex;
      align-items:center;
      padding:0 24px;
    }

    #search-input {
      flex:1;
      background:transparent;
      border:none;
      outline:none;
      color:white;
      font-size:18px;
    }

    .shortcut {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 15px;
      text-align:center;
      cursor:pointer;
    }

    .shortcut:hover {
      background: var(--card-hover);
    }

    .history-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px 20px;
      cursor:pointer;
    }

    .history-item:hover {
      background: var(--card-hover);
    }

    .history-title {
      font-size:14px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .history-url {
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
  </style>
</head>

<body>

<div id="cursor-glow"></div>

<div class="main-content">

  <div id="header">
    <div id="clock">00:00</div>
    <div id="date-greeting"></div>
  </div>

  <div class="search-box">
    <input id="search-input" placeholder="Search..." />
  </div>

  <div id="history-container"></div>

</div>

<script>
const api = window.pyBrowser;

const glow = document.getElementById("cursor-glow");
const clockEl = document.getElementById("clock");
const greetingEl = document.getElementById("date-greeting");
const input = document.getElementById("search-input");

function navigate(val) {
  if (!val) return;

  let url = val;
  const isUrl = /^https?:\/\//i.test(val) ||
    (/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(\/.*)?$/.test(val));

  if (!isUrl) {
    url = `https://duckduckgo.com/?q=${encodeURIComponent(val)}`;
  } else if (!/^https?:\/\//i.test(val)) {
    url = "https://" + val;
  }

  if (api?.sendToHost) api.sendToHost("navigate", url);
  else window.location.href = url;
}

/* CLOCK */
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2,"0");
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;

  clockEl.textContent = `${h}:${m} ${ampm}`;

  const g = h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening";
  greetingEl.textContent = `${g}, it's ${now.toDateString()}`;
}

/* CURSOR GLOW (FIXED PERFORMANCE) */
let mx = 0, my = 0;

document.addEventListener("mousemove", (e) => {
  mx = e.clientX;
  my = e.clientY;
});

function animateGlow() {
  glow.style.left = mx + "px";
  glow.style.top = my + "px";
  requestAnimationFrame(animateGlow);
}
animateGlow();

/* HISTORY (FIXED XSS SAFE) */
async function loadHistory() {
  if (!api?.getHistory) return;

  const history = await api.getHistory();
  const container = document.getElementById("history-container");
  container.innerHTML = "";

  if (!history?.length) {
    container.innerHTML = `<div style="color:#a1a1aa">No history yet.</div>`;
    return;
  }

  history.slice(0,4).forEach(item => {
    const el = document.createElement("div");
    el.className = "history-item";

    const title = document.createElement("div");
    title.className = "history-title";
    title.textContent = item.title || item.url;

    const url = document.createElement("div");
    url.className = "history-url";
    url.textContent = item.url;

    const info = document.createElement("div");
    info.appendChild(title);
    info.appendChild(url);

    el.appendChild(info);

    el.onclick = () => navigate(item.url);

    container.appendChild(el);
  });
}

/* SEARCH */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") navigate(input.value);
});

/* INIT */
updateClock();
setInterval(updateClock, 1000);
loadHistory();

</script>

</body>
</html>
